# Chaos Engineering 控制器
# =========================
# 在单机 Docker 上对 YugabyteDB 集群注入网络故障
#
# 用法:
#   make chaos CMD="status"
#   make chaos CMD="partition isolate region1"
#   make chaos CMD="scenario run network-partition yb-1 20"

services:
  chaosctl:
    build:
      context: .
      dockerfile: Dockerfile.chaosctl
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # host 网络: 可以直接 docker exec 解析容器名
    network_mode: "host"
